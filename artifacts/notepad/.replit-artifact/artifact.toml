kind = "web"
previewPath = "/"
title = "Notepad"
version = "1.0.0"
id = "artifacts/notepad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25507
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/notepad run dev"

[services.env]
PORT = "25507"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/notepad", "run", "build"]
publicDir = "artifacts/notepad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
